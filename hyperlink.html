   <h2>Hyperlinks in HTML</h2>
   <p>
     A hyperlink is ctreated using the <b>&lt:a&gt:</b>(anchor)tag. The <b>href</b>attribute
      specifies the link address and the <b>target</b>attribute specifies where the link open.
   </p>   
   <a href="https://en.wikipedia.org/wiki/Artificial_intelligence">
    Open Google in new tab
