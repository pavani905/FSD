<!DOCTYPE html>
<html>
<head>
    <title>HTML Lists Example</title>
</head>
<body>

<h3>Unordered List</h3>
<ul>
    <li>Apple</li>
    <li>Banana</li>
    <li>Orange</li>
</ul>

<h3>Ordered List</h3>
<ol>
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>
</ol>

<h3>Nested List</h3>
<ul>
    <li>Programming Languages
        <ul>
            <li>C</li>
            <li>Java</li>
            <li>Python</li>
        </ul>
    </li>
</ul>

<h3>Definition List</h3>
<dl>
    <dt>HTML</dt>
    <dd>Hyper Text Markup Language</dd>
</dl>

</body>
</html>
